# Azure Pipelines — Feature-Comparison Doc Sync
#
# Keeps docs/lite/02-feature-comparison.md in lock-step with its source of truth,
# lab/lite/docs/feature-comparison.html.
#
# Runs on every push to `master` (i.e. right after a PR merges). It regenerates the
# markdown via scripts/gen-feature-comparison.ts and — ONLY if that changed the doc —
# opens a companion pull request with the update (scripts/open-feature-doc-sync-pr.ts).
#
# Why a companion PR instead of committing to master or to the merged PR branch:
#   - Fork-safe: the merged PR may have come from a fork the CI token can't push to.
#   - One-click accept: a maintainer just merges the auto-PR.
#   - No surprise commits on master; the doc change stays reviewable.
#
# Most merges don't touch the feature table, so the path filter below keeps this from
# running needlessly, and the driver is a noop whenever the doc is already in sync.
#
# ── Secrets (set as a SECRET pipeline variable on this pipeline) ───────────────────
#   - GITHUB_TOKEN   PAT with contents:write + pull_requests:write (opens the PR)

trigger:
    branches:
        include:
            - master
    paths:
        include:
            - lab/lite/docs/feature-comparison.html
            - docs/lite/02-feature-comparison.md
            - scripts/gen-feature-comparison.ts
            - scripts/open-feature-doc-sync-pr.ts

pr: none

variables:
    - name: NODE_VERSION
      value: "22.x"
    - name: PNPM_VERSION
      value: "9.15.4"
    - name: CI
      value: "true"
    - name: TARGET_REPO
      value: "BabylonJS/Babylon-Lite"

stages:
    - stage: FeatureDocSync
      displayName: "Feature-Comparison Doc Sync"
      jobs:
          - job: SyncAndOpenPr
            displayName: "Regenerate doc and open sync PR if drifted"
            pool:
                vmImage: "ubuntu-latest"
            steps:
                - checkout: self
                  fetchDepth: 0
                  persistCredentials: true

                - task: UseNode@1
                  inputs:
                      version: $(NODE_VERSION)

                - script: |
                      corepack enable
                      corepack prepare pnpm@$(PNPM_VERSION) --activate
                  displayName: "Enable pnpm via corepack"

                - script: pnpm install --frozen-lockfile
                  displayName: "Install dependencies"

                - script: npx tsx scripts/open-feature-doc-sync-pr.ts
                  displayName: "Sync feature-comparison doc and open PR if needed"
                  env:
                      GITHUB_REPOSITORY: $(TARGET_REPO)
                      GITHUB_TOKEN: $(GITHUB_TOKEN)
                      BASE_BRANCH: master
